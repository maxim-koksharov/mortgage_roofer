name: mortgage_roofer

x-common: &common
  build:
    context: .
    dockerfile: Dockerfile
  image: mortgage_roofer
  working_dir: /workspace
  environment:
    - HOME=/home/developer
    - OPENCODE_DISABLE_AUTO_UPDATES=true
    - OPENCODE_SNAPSHOT_PATH=/home/developer/.local/share/opencode/snapshot-container
    - OPENCODE_MAX_THREADS=4
    - RAYON_NUM_THREADS=4
    - OMP_NUM_THREADS=4
    - CARGO_BUILD_JOBS=4
    - MAKEFLAGS=-j4
  volumes:
    - ".:/workspace:rw"
    - "${HOME}/.config/opencode:/home/developer/.config/opencode:rw"
    - "${HOME}/.local/share/opencode:/home/developer/.local/share/opencode"
  tty: true
  stdin_open: true
  cap_add:
    - SYS_PTRACE
  security_opt:
    - "apparmor=unconfined"
  deploy:
    resources:
      limits:
        memory: 5G
      reservations:
        memory: 2G

services:
  bash:
    <<: *common
    command: ["bash"]
